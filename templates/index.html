<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AttendAI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080c10;
    --surf:    #0e1419;
    --border:  #1c2530;
    --accent:  #00e5a0;
    --blue:    #0077ff;
    --red:     #ff4560;
    --text:    #c8d6e5;
    --muted:   #4a6075;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; }

  /* Header */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 32px; border-bottom:1px solid var(--border);
    background:var(--surf); position:sticky; top:0; z-index:10;
  }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem; color:#fff; }
  .logo span { color:var(--accent); }
  .pill {
    font-size:0.65rem; padding:4px 12px; border-radius:40px;
    border:1px solid var(--accent); color:var(--accent);
    letter-spacing:.08em; text-transform:uppercase;
  }

  /* Layout */
  .layout {
    display:grid;
    grid-template-columns: 1fr 380px;
    gap:0;
    height: calc(100vh - 57px);
  }

  /* Left — camera */
  .camera-panel {
    display:flex; flex-direction:column;
    border-right:1px solid var(--border);
    background:#050709;
    position:relative;
  }

  .cam-header {
    display:flex; align-items:center; gap:10px;
    padding:12px 20px; border-bottom:1px solid var(--border);
    background:var(--surf);
  }

  .cam-title { font-size:0.65rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); }

  #live-dot {
    width:7px; height:7px; border-radius:50%;
    background:var(--red); box-shadow:0 0 6px var(--red);
    transition: background .3s, box-shadow .3s;
  }
  #live-dot.on {
    background:var(--accent); box-shadow:0 0 8px var(--accent);
    animation:pulse 1.8s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  .cam-body {
    flex:1; display:flex; align-items:center; justify-content:center;
    padding:16px; overflow:hidden;
  }

  #cam-placeholder {
    text-align:center; color:var(--muted);
  }
  #cam-placeholder .icon { font-size:3rem; margin-bottom:12px; opacity:.4; }
  #cam-placeholder p { font-size:0.8rem; line-height:1.7; }

  #cam-stream {
    display:none; max-width:100%; max-height:100%;
    border-radius:8px; border:1px solid var(--border);
    object-fit:contain;
  }

  .cam-footer {
    padding:12px 20px; border-top:1px solid var(--border);
    display:flex; gap:10px; background:var(--surf);
  }

  /* Buttons */
  button {
    font-family:'DM Mono',monospace; font-size:0.75rem;
    padding:9px 18px; border-radius:6px; border:none;
    cursor:pointer; font-weight:500; letter-spacing:.04em;
    transition:opacity .15s, transform .1s;
  }
  button:hover { opacity:.85; transform:translateY(-1px); }
  button:active { transform:translateY(0); }
  .btn-start { background:var(--accent); color:#000; }
  .btn-stop  { background:var(--border); color:var(--red); border:1px solid var(--red); }
  #cam-status { font-size:0.72rem; color:var(--muted); display:flex; align-items:center; margin-left:auto; }

  /* Right panel */
  .right-panel {
    display:flex; flex-direction:column; overflow:hidden;
  }

  /* Stats */
  .stats {
    display:grid; grid-template-columns:1fr 1fr 1fr;
    border-bottom:1px solid var(--border);
  }
  .stat {
    padding:16px 14px; border-right:1px solid var(--border);
    position:relative;
  }
  .stat:last-child { border-right:none; }
  .stat::after {
    content:''; position:absolute; top:0; left:0; right:0;
    height:2px; background:var(--accent); opacity:.4;
  }
  .stat-label { font-size:0.58rem; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:6px; }
  .stat-val { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800; color:#fff; }

  /* Table area */
  .table-area {
    flex:1; overflow-y:auto; padding:16px;
  }
  .table-area::-webkit-scrollbar { width:4px; }
  .table-area::-webkit-scrollbar-track { background:transparent; }
  .table-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .section-label {
    font-size:0.6rem; text-transform:uppercase; letter-spacing:.1em;
    color:var(--muted); margin-bottom:10px; display:flex;
    align-items:center; justify-content:space-between;
  }

  table { width:100%; border-collapse:collapse; }
  th {
    background:#0a0f14; padding:8px 10px; text-align:left;
    font-size:0.58rem; text-transform:uppercase; letter-spacing:.08em;
    color:var(--muted); position:sticky; top:0;
  }
  td {
    padding:9px 10px; border-bottom:1px solid var(--border);
    font-size:0.75rem;
  }
  tr:hover td { background:#0e1820; }
  tr:last-child td { border-bottom:none; }

  .badge {
    display:inline-block; padding:2px 8px; border-radius:20px;
    font-size:0.62rem; letter-spacing:.04em;
    background:rgba(0,229,160,.1); color:var(--accent);
    border:1px solid rgba(0,229,160,.25);
  }

  .empty { text-align:center; padding:30px 0; color:var(--muted); font-size:0.78rem; }

  /* Responsive */
  @media(max-width:820px) {
    .layout { grid-template-columns:1fr; grid-template-rows:auto 1fr; }
    .camera-panel { height:280px; border-right:none; border-bottom:1px solid var(--border); }
    .layout { height:auto; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">ATTEND<span>AI</span></div>
  <div class="pill" id="sys-pill">● ONLINE</div>
</header>

<div class="layout">

  <!-- Camera panel -->
  <div class="camera-panel">
    <div class="cam-header">
      <div id="live-dot"></div>
      <span class="cam-title">Live Camera Feed</span>
    </div>
    <div class="cam-body">
      <div id="cam-placeholder">
        <div class="icon">📷</div>
        <p>Click <strong>Start Attendance</strong><br>to activate the camera.</p>
      </div>
      <img id="cam-stream" src="" alt="Camera feed">
    </div>
    <div class="cam-footer">
      <button class="btn-start" id="btn-start" onclick="startCamera()">▶ Start Attendance</button>
      <button class="btn-stop"  id="btn-stop"  onclick="stopCamera()" style="display:none">■ Stop</button>
      <span id="cam-status">Idle</span>
    </div>
  </div>

  <!-- Right panel -->
  <div class="right-panel">

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Today</div>
        <div class="stat-val" id="cnt-today">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Students</div>
        <div class="stat-val" id="cnt-students">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Total</div>
        <div class="stat-val" id="cnt-all">—</div>
      </div>
    </div>

    <div class="table-area">
      <div class="section-label">
        <span>Today's Attendance</span>
        <span id="date-lbl"></span>
      </div>
      <table>
        <thead>
          <tr><th>#</th><th>Name</th><th>Roll</th><th>Time</th><th>Status</th></tr>
        </thead>
        <tbody id="att-body">
          <tr><td colspan="5" class="empty">No attendance yet.</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script>
  let streaming = false;

  async function api(url) {
    const r = await fetch(url); return r.json();
  }

  function renderTable(rows) {
    const b = document.getElementById('att-body');
    if (!rows.length) {
      b.innerHTML = '<tr><td colspan="5" class="empty">No attendance recorded today.</td></tr>';
      return;
    }
    b.innerHTML = rows.map((r,i) => `
      <tr>
        <td>${i+1}</td><td>${r.name}</td><td>${r.roll_no}</td>
        <td>${r.time}</td><td><span class="badge">${r.status}</span></td>
      </tr>`).join('');
  }

  async function refresh() {
    const [today, students, all] = await Promise.all([
      api('/api/attendance/today'),
      api('/api/students'),
      api('/api/attendance/all'),
    ]);
    document.getElementById('cnt-today').textContent    = today.length;
    document.getElementById('cnt-students').textContent = students.length;
    document.getElementById('cnt-all').textContent      = all.length;
    renderTable(today);
  }

  function startCamera() {
    streaming = true;
    const img  = document.getElementById('cam-stream');
    const ph   = document.getElementById('cam-placeholder');
    const dot  = document.getElementById('live-dot');
    const btnS = document.getElementById('btn-start');
    const btnX = document.getElementById('btn-stop');

    img.src = '/video-feed';
    img.style.display = 'block';
    ph.style.display  = 'none';
    dot.classList.add('on');
    btnS.style.display = 'none';
    btnX.style.display = 'inline-block';
    document.getElementById('cam-status').textContent = '🎥 Recognizing...';
  }

  function stopCamera() {
    streaming = false;
    const img  = document.getElementById('cam-stream');
    const ph   = document.getElementById('cam-placeholder');
    const dot  = document.getElementById('live-dot');
    const btnS = document.getElementById('btn-start');
    const btnX = document.getElementById('btn-stop');

    img.src = '';
    img.style.display = 'none';
    ph.style.display  = 'block';
    dot.classList.remove('on');
    btnS.style.display = 'inline-block';
    btnX.style.display = 'none';
    document.getElementById('cam-status').textContent = 'Idle';
  }

  document.getElementById('date-lbl').textContent =
    new Date().toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});

  refresh();
  setInterval(refresh, 6000);
</script>
</body>
</html>
