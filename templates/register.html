<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AttendAI — Register</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg:#080c10; --surf:#0e1419; --border:#1c2530; --accent:#00e5a0; --text:#c8d6e5; --muted:#4a6075; --red:#ff4560; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .card { background:var(--surf); border:1px solid var(--border); border-radius:16px; padding:40px 36px; width:100%; max-width:420px; }
  .logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.5rem; color:#fff; margin-bottom:6px; }
  .logo span { color:var(--accent); }
  .sub { font-size:0.72rem; color:var(--muted); margin-bottom:32px; }
  label { font-size:0.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; display:block; margin-bottom:6px; margin-top:16px; }
  input { width:100%; padding:10px 14px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Mono',monospace; font-size:0.85rem; outline:none; transition:.2s; }
  input:focus { border-color:var(--accent); }
  button { width:100%; margin-top:24px; padding:12px; background:var(--accent); color:#000; border:none; border-radius:8px; font-family:'DM Mono',monospace; font-size:0.85rem; font-weight:600; cursor:pointer; transition:.15s; }
  button:hover { opacity:.88; }
  .err { margin-top:14px; font-size:0.75rem; color:var(--red); text-align:center; min-height:18px; }
  .ok  { margin-top:14px; font-size:0.75rem; color:var(--accent); text-align:center; min-height:18px; }
  .link { text-align:center; margin-top:20px; font-size:0.72rem; color:var(--muted); }
  .link a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">ATTEND<span>AI</span></div>
  <div class="sub">Create Teacher Account</div>

  <label>Full Name</label>
  <input type="text" id="name" placeholder="Dr. John Smith">

  <label>Email</label>
  <input type="email" id="email" placeholder="teacher@school.edu">

  <label>Password</label>
  <input type="password" id="password" placeholder="min. 6 characters">

  <button onclick="register()">Create Account</button>
  <div class="err" id="err"></div>
  <div class="ok"  id="ok"></div>
  <div class="link"><a href="/login">← Back to login</a></div>
</div>

<script>
  async function register() {
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err      = document.getElementById('err');
    const ok       = document.getElementById('ok');
    err.textContent = ''; ok.textContent = '';
    if (!name || !email || !password) { err.textContent = 'All fields required.'; return; }
    const r = await fetch('/api/auth/register-teacher', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, email, password})
    });
    const d = await r.json();
    if (d.message) { ok.textContent = d.message + ' Redirecting...'; setTimeout(() => window.location.href = '/login', 1500); }
    else err.textContent = d.error || 'Registration failed.';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
</script>
</body>
</html>
